# Change leader
set -g prefix C-f

# Set vim-like pane switching and resizing  
setw -g mode-keys vi

bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R

bind -r k select-pane -U 
bind -r j select-pane -D 
bind -r h select-pane -L 
bind -r l select-pane -R 

# Unbind old movement keys
unbind Up     
unbind Down   
unbind Left   
unbind Right  

unbind C-Up   
unbind C-Down 
unbind C-Left 
unbind C-Right

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

# Rename current window
bind-key E command-prompt -I "rename-window "

# Kill current session
bind-key K confirm-before -p "kill-session? (y/n)" kill-session

# split panes using | and -
bind \\ split-window -h
bind - split-window -v
unbind '"'
unbind %

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'

# Configure theme
set -g @catppuccin_flavour 'macchiato'

set -g @catppuccin_window_right_separator "█ "
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_modules_right "application session date_time"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_application_text "#{pane_current_path}"
set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M:%S"
set -g @catppuccin_pane_border_style "fg=blue"
set -g @catppuccin_pane_active_border_style "fg=blue"

set -g status-position top

# Initialize TPM (should always be the last line)
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin:/usr/sbin:/sbin"
run '/opt/homebrew/opt/tpm/share/tpm/tpm'
